<!DOCTYPE html>
<html lang="ja">

<head>
    <script src="coi-serviceworker.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫将棋</title>

    <!-- スマホでホーム画面に追加した際のアイコン設定 -->
    <link rel="apple-touch-icon" href="img/icon.jpg">
    <link rel="icon" href="img/icon.jpg">
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="stylesheet" href="css/ai.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- ホーム画面（メニュー） -->
        <div id="home-screen" class="screen">
            <div id="controls" class="menu-controls">
                <button id="btn-start" class="btn">通常対局</button>
                <button id="btn-ai-match" class="btn">AIと対局</button>
                <button id="btn-import-kifu" class="btn">棋譜を読込</button>
                <button id="btn-puzzle-menu" class="btn">詰将棋道場</button>
                <button id="btn-settings" class="btn">設定</button>
            </div>
        </div>

        <!-- 難易度選択画面 -->
        <div id="puzzle-difficulty-screen" class="screen hidden">
            <header>
                <h2>詰将棋道場</h2>
                <p>難易度を選ぼう！</p>
            </header>
            <div class="menu-controls"
                style="flex-direction: column; align-items: center; gap: 20px; width: 100%; margin: 30px 0;">
                <button id="btn-diff-1" class="btn puzzle-btn" style="width: 80%; text-align: center;">1手詰め</button>
                <button id="btn-diff-3" class="btn puzzle-btn" style="width: 80%; text-align: center;">3手詰め</button>
            </div>
            <div class="menu-controls">
                <button id="btn-back-to-home-from-diff" class="btn back-btn">メニューに戻る</button>
            </div>
        </div>

        <!-- 詰将棋 問題リスト画面 -->
        <div id="puzzle-select-screen" class="screen hidden">
            <header>
                <h2>詰将棋道場</h2>
                <p>問題を選んで挑戦しよう！</p>
            </header>
            <div id="puzzle-list" class="puzzle-list">
                <!-- JavaScriptでパズルボタンを生成します -->
            </div>
            <div class="menu-controls">
                <button id="btn-back-to-home" class="btn back-btn">メニューに戻る</button>
            </div>
        </div>

        <!-- 設定画面 -->
        <div id="settings-screen" class="screen hidden">
            <header>
                <h2>設定</h2>
            </header>
            <div class="menu-controls"
                style="flex-direction: column; align-items: center; gap: 20px; width: 100%; margin: 30px 0;">
                <div
                    style="width: 80%; max-width: 300px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 10px; border: 2px solid var(--board-line);">
                    <label for="bgm-toggle" style="font-size: 1.2rem; font-weight: bold;">BGM</label>
                    <input type="checkbox" id="bgm-toggle" style="transform: scale(2); cursor: pointer;" checked>
                </div>
                <div
                    style="width: 80%; max-width: 300px; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 10px; border: 2px solid var(--board-line);">
                    <label for="bgm-volume" style="font-size: 1.2rem; font-weight: bold;">音量</label>
                    <input type="range" id="bgm-volume" min="0" max="1" step="0.05" value="0.5"
                        style="width: 100%; cursor: pointer;">
                </div>
                <div
                    style="width: 80%; max-width: 300px; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 10px; border: 2px solid var(--board-line); margin-top: 10px;">
                    <label for="ai-depth" style="font-size: 1.2rem; font-weight: bold;">AIの強さ (1〜15)</label>
                    <div style="display:flex; width:100%; align-items:center; gap:10px;">
                        <input type="range" id="ai-depth" min="1" max="15" step="1" value="10"
                            style="flex:1; cursor: pointer;">
                        <span id="ai-depth-value" style="font-weight:bold; width:30px;">10</span>
                    </div>
                    <small style="color:#666;">※数字が大きいほど強く、考える時間が長くなります。</small>
                </div>
            </div>
            <div class="menu-controls">
                <button id="btn-back-to-home-from-settings" class="btn back-btn">メニューに戻る</button>
            </div>
        </div>

        <!-- 対局・パズルプレイ画面 -->
        <div id="game-screen" class="screen hidden">
            <div id="game-layout-wrapper">
                <!-- 解説文表示エリア -->
                <div id="puzzle-explanation-area">
                    <h3 style="margin-top:0; border-bottom: 2px solid var(--board-line); padding-bottom: 5px;">解答解説</h3>
                    <p id="puzzle-explanation-text" style="line-height: 1.6; font-size: 1.1rem;"></p>
                </div>

                <div id="main-area">
                    <!-- 相手の駒台 -->
                    <div id="opponent-hand" class="piece-stand">
                        <h3 id="opponent-hand-title">後手</h3>
                        <div class="pieces-container"></div>
                    </div>

                    <!-- 将棋盤と座標 -->
                    <div id="board-container">
                        <div class="col-coords">
                            <span>9</span><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
                        </div>
                        <div class="board-with-rows">
                            <div id="shogi-board">
                                <!-- 盤のマス目はJavaScriptで生成します -->
                            </div>
                            <div class="row-coords">
                                <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>七</span><span>八</span><span>九</span>
                            </div>
                        </div>
                    </div>

                    <!-- 自分の駒台 -->
                    <div id="player-hand" class="piece-stand">
                        <h3 id="player-hand-title">先手</h3>
                        <div class="pieces-container"></div>
                    </div>
                </div>

                <!-- AI検討エリア -->
                <div id="ai-evaluation-area" class="ai-panel">
                    <h3
                        style="margin-top:0; border-bottom: 2px solid var(--board-line); padding-bottom: 5px; font-size: 1.1rem; color: var(--text-color);">
                        AI検討</h3>
                    <div class="ai-controls"
                        style="margin-bottom: 10px; display: flex; align-items: center; gap: 10px;">
                        <button id="ai-toggle-btn" class="btn" style="padding: 5px 10px; font-size: 0.9rem;">AI検討:
                            OFF</button>
                        <span id="ai-status" style="font-size: 0.9rem; color: #555;">AI未起動</span>
                    </div>
                    <div class="ai-results"
                        style="background-color: rgba(255,255,255,0.8); padding: 10px; border-radius: 5px; border: 1px solid var(--board-line);">
                        <div style="margin-bottom: 5px;">
                            <span style="font-weight: bold; font-size: 0.9rem;">評価値(cp):</span>
                            <span id="ai-eval"
                                style="margin-left: 5px; font-weight: bold; color: var(--text-color); font-size: 1.1rem;">-</span>
                        </div>
                        <div>
                            <span style="font-weight: bold; font-size: 0.9rem;">読み筋(pv):</span>
                            <div id="ai-pv"
                                style="margin-top: 5px; font-size: 0.85rem; color: #333; min-height: 40px; word-break: break-all;">
                                -</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-controls game-controls"
                style="margin-top: 5px; flex-direction: row; justify-content: center; align-items: center; gap: 5px; width: 100%;">
                <h2 id="game-title"
                    style="margin: 0; font-size: 1.1rem; white-space: nowrap; color: var(--text-color);">通常対局</h2>
                <button id="btn-show-hint" class="btn hidden" style="...">解答解説</button>

                <button id="btn-replay-prev" class="btn hidden" style="padding: 6px 8px; font-size: 0.9rem; flex: 1;">◀
                    前</button>
                <button id="btn-replay-next" class="btn hidden" style="padding: 6px 8px; font-size: 0.9rem; flex: 1;">次
                    ▶</button>
                <button id="btn-undo" class="btn hidden" style="padding: 6px 8px; font-size: 1.0rem; flex: 1; background-color: var(--secondary-color);">待った</button>
                <button id="btn-back-to-menu" class="btn back-btn" style="...">戻る</button>
                <button id="btn-next-puzzle" class="btn hidden" style="...">次へ</button>
            </div>

        </div>
    </div>

    <script src="js/pieces.js"></script>

    <script src="js/audio.js"></script>
    <script src="js/ai-manager.js"></script>
    <script src="js/puzzles/puzzles_1.js"></script>
    <script src="js/puzzles/puzzles_3.js"></script>
    <script src="js/board.js"></script>
    <script src="js/main.js"></script>


    <!-- 結果表示用モーダル（小さめのバナー） -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content small-banner">
            <h2 id="result-message" class="result-text puzzle-banner-text">詰みです！</h2>
            <p id="result-explanation" class="result-explanation hidden"></p>
            <div id="modal-buttons" style="display:flex; gap:10px; justify-content:center;">
                <!-- JSで動的に追加されます（正解時は追加されない） -->
            </div>
        </div>
    </div>

    <!-- 詰将棋正解時の3秒ポップアップ -->
    <div id="success-popup" class="success-popup">
        <img src="img/correct_answer.jpg" alt="大正解！"
            style="width: 100%; height: auto; border-radius: 20px; display: block;">
    </div>

    <div id="kifu-modal" class="modal hidden">
        <div class="modal-content" style="pointer-events: auto; max-width: 500px;">
            <h3 style="margin-bottom:10px;">将棋クエスト(CSA形式)を貼付</h3>
            <textarea id="kifu-input" placeholder="+2726FU..."
                style="width:100%; height:200px; padding:10px; font-size:1rem; border-radius:5px;"></textarea>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
                <button id="btn-kifu-cancel" class="btn">キャンセル</button>
                <button id="btn-kifu-start" class="btn primary-btn">検討開始</button>
            </div>
        </div>
    </div>

</body>

</html>
